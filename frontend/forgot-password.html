<div class="container auth-container">
    <h2>Forgot Password</h2>
    <form id="forgotPasswordForm">
        <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
        <button type="submit" class="btn">Send Reset Link</button>
    </form>
    <p id="message"></p>
</div>

<script>
    document.getElementById('forgotPasswordForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value;
        const response = await fetch('http://localhost:5001/api/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email })
        });
        const result = await response.json();
        document.getElementById('message').innerText = result.message || result.error;
    };
</script>
