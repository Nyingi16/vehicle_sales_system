<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Admins | DriveSelect AI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-gray: #94a3b8;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
        }

        .back-nav {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .glass-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        h2 { margin-bottom: 25px; font-weight: 700; }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Table Styling */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 20px;
        }

        th {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            color: var(--text-gray);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .delete-btn:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="back-nav">
            <a href="admin-dashboard.html" class="back-btn">← Back to Dashboard</a>
        </div>

        <section class="glass-card">
            <h2>Create Auxiliary Admin</h2>
            <form id="addAdminForm" class="auth-form">
                <input type="text" id="admin_user" placeholder="Admin Username" required>
                <input type="email" id="admin_email" placeholder="Admin Email" required>
                <input type="password" id="admin_pass" placeholder="Admin Password" required>
                <button type="submit" class="btn">Create Admin Account</button>
            </form>
        </section>

        <section class="glass-card">
            <h2>Existing Administrators</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminList">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // Form Submission
        document.getElementById('addAdminForm').onsubmit = async (e) => {
            e.preventDefault();
            const adminData = {
                username: document.getElementById('admin_user').value,
                email: document.getElementById('admin_email').value,
                password: document.getElementById('admin_pass').value
            };

            try {
                const response = await fetch('http://localhost:5001/api/admin/add-aux-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(adminData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert("Success: " + result.message);
                    document.getElementById('addAdminForm').reset();
                    fetchAdmins(); // Refresh table
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Server connection failed.");
            }
        };

        // Load Admin List
        async function fetchAdmins() {
            try {
                const response = await fetch('http://localhost:5001/api/admin/list');
                const admins = await response.json();
                const tbody = document.getElementById('adminList');
                
                tbody.innerHTML = admins.map(admin => `
                    <tr>
                        <td>${admin.username}</td>
                        <td>${admin.email}</td>
                        <td>
                            <button onclick="deleteAdmin(${admin.id})" class="delete-btn">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Failed to fetch admins");
            }
        }

        // Delete Admin
        async function deleteAdmin(adminId) {
            if (!confirm("Are you sure you want to remove this admin?")) return;
            try {
                const response = await fetch(`http://localhost:5001/api/admin/delete/${adminId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (response.ok) {
                    alert(result.message);
                    fetchAdmins();
                } else {
                    alert(result.error);
                }
            } catch (err) {
                alert("Delete failed.");
            }
        }

        // Initial Load
        document.addEventListener('DOMContentLoaded', fetchAdmins);
    </script>
</body>
</html>
