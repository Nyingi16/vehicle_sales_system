<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Insights | DriveSelect AI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-gray: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reports-container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
        }

        .back-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { color: var(--accent-blue); margin-top: 0; font-weight: 700; }

        .report-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn-print {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-print.finance { background: var(--success); }
        .btn-print.sold { background: var(--warning); color: #000; }
        
        .btn-print:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        th { 
            padding: 15px; 
            color: var(--text-gray); 
            border-bottom: 2px solid rgba(255,255,255,0.1); 
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
        }

        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .status-pill {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-pill.sold {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .status-pill.pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin: 10px 0;
        }

        .stat-card .stat-label {
            color: var(--text-gray);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- PRINT ENGINE STYLES --- */
        @media print {
            body { background: white; color: black; }
            .back-nav, .report-controls, .no-print { display: none !important; }
            .glass-card { border: none; background: white; padding: 0; box-shadow: none; }
            .print-header { display: block !important; margin-bottom: 30px; }
            th { color: black; border-bottom: 2px solid black; }
            td { border-bottom: 1px solid #eee; color: black; }
            h2 { color: black; }
            .stat-card { background: #f5f5f5; border: 1px solid #ddd; }
        }

        .print-header { display: none; text-align: center; }
        
        .customer-info {
            font-size: 0.8rem;
            color: var(--text-gray);
        }
        
        .verification-badge {
            background: var(--success);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="reports-container">
        <div class="back-nav no-print">
            <a href="admin-dashboard.html" class="back-btn">← Back to Dashboard</a>
            <h1 style="margin: 0; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;">SYSTEM REPORTS</h1>
        </div>

        <section class="glass-card report-controls no-print">
            <button onclick="generateReport('inventory')" class="btn-print">
                <i class="fas fa-car"></i> Inventory Analysis
            </button>
            <button onclick="generateReport('finance')" class="btn-print finance">
                <i class="fas fa-chart-line"></i> Financial Valuation
            </button>
            <button onclick="generateReport('sold')" class="btn-print sold">
                <i class="fas fa-check-circle"></i> Sold Vehicles Report
            </button>
        </section>

        <section class="glass-card" id="reportView">
            <div class="print-header">
                <h1 style="margin-bottom: 5px;">DRIVESELECT AI</h1>
                <p style="margin-top: 0; color: #666;">Official Management Statement</p>
                <p id="reportTimestamp" style="font-size: 0.8rem;"></p>
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
            </div>
            
            <h2 id="viewTitle">Select a Report Type</h2>
            <div id="reportContent">
                <p style="color: var(--text-gray); text-align: center; padding: 40px 0;">
                    <i class="fas fa-chart-pie" style="font-size: 3rem; opacity: 0.5; display: block; margin-bottom: 15px;"></i>
                    Please choose a report category above to generate live data from the database.
                </p>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = 'http://localhost:5001/api';
        
        // Helper function to get current user for admin auth
        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                return JSON.parse(saved);
            }
            return null;
        }

        async function generateReport(type) {
            const content = document.getElementById('reportContent');
            const title = document.getElementById('viewTitle');
            const timestamp = document.getElementById('reportTimestamp');
            
            content.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><p>Loading Report Data...</p></div>`;
            timestamp.innerText = `Statement Date: ${new Date().toLocaleString()}`;

            try {
                if (type === 'sold') {
                    await generateSoldVehiclesReport(content, title);
                } else if (type === 'inventory') {
                    await generateInventoryReport(content, title);
                } else if (type === 'finance') {
                    await generateFinanceReport(content, title);
                }
            } catch (err) {
                console.error('Report error:', err);
                content.innerHTML = `<p style="color: #ef4444; text-align:center;"><i class="fas fa-exclamation-triangle"></i> Critical Error: Could not establish a secure connection to the database server.<br>${err.message}</p>`;
            }
        }

        async function generateInventoryReport(content, title) {
            title.innerText = "Available Inventory: Make, Model & Category";
            
            // Fetch all available vehicles
            const response = await fetch(`${API_BASE}/recommendations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ preferences: {} })
            });
            
            const data = await response.json();
            const vehicles = data.recommendations || [];
            
            // Also fetch sold vehicles count for context
            let soldCount = 0;
            try {
                const currentUser = getCurrentUser();
                if (currentUser && currentUser.role === 'admin') {
                    const purchasesResponse = await fetch(`${API_BASE}/admin/purchases?user_id=${currentUser.id}`);
                    const purchases = await purchasesResponse.json();
                    soldCount = purchases.filter(p => p.payment_status === 'completed' || p.payment_status === 'PENDING_ADMIN_APPROVAL').length;
                }
            } catch(e) { console.log('Could not fetch sold count'); }
            
            const totalValue = vehicles.reduce((sum, v) => sum + parseFloat(v.price), 0);
            
            content.innerHTML = `
                <div class="summary-stats">
                    <div class="stat-card">
                        <div class="stat-label">Available Units</div>
                        <h3>${vehicles.length}</h3>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Inventory Value</div>
                        <h3 style="color: var(--success);">$${totalValue.toLocaleString()}</h3>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Sold Vehicles (All Time)</div>
                        <h3>${soldCount}</h3>
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref ID</th>
                                <th>Make</th>
                                <th>Model</th>
                                <th>Year</th>
                                <th>Price</th>
                                <th>Fuel Type</th>
                                <th>Transmission</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${vehicles.map(v => `
                                <tr>
                                    <td>#DS-${v.id}</td>
                                    <td style="font-weight: 600;">${v.make}</td>
                                    <td>${v.model}</td>
                                    <td>${v.year}</td>
                                    <td style="color: var(--success);">$${parseFloat(v.price).toLocaleString()}</td>
                                    <td>${v.fuel_type || 'N/A'}</td>
                                    <td>${v.transmission || 'N/A'}</td>
                                    <td><span class="status-pill">Available</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <button class="btn-print no-print" style="margin-top:30px; width:100%;" onclick="window.print()">
                    <i class="fas fa-download"></i> Download as PDF Report
                </button>
            `;
        }

        async function generateFinanceReport(content, title) {
            title.innerText = "Financial Asset & Valuation Report";
            
            const response = await fetch(`${API_BASE}/recommendations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ preferences: {} })
            });
            
            const data = await response.json();
            const vehicles = data.recommendations || [];
            const totalValue = vehicles.reduce((sum, v) => sum + parseFloat(v.price), 0);
            const avgPrice = vehicles.length > 0 ? totalValue / vehicles.length : 0;
            
            content.innerHTML = `
                <div class="summary-stats">
                    <div class="stat-card">
                        <div class="stat-label">Total Portfolio Value</div>
                        <h3 style="color: var(--success);">$${totalValue.toLocaleString()}</h3>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Unit Count</div>
                        <h3>${vehicles.length} Units</h3>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Average Unit Price</div>
                        <h3>$${avgPrice.toLocaleString()}</h3>
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Vehicle Descriptor</th>
                                <th>Year</th>
                                <th>Unit Price</th>
                                <th>VAT (16%)</th>
                                <th>Total (Inc. Tax)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${vehicles.map(v => `
                                <tr>
                                    <td style="font-weight: 500;">${v.make} ${v.model}</td>
                                    <td>${v.year}</td>
                                    <td>$${parseFloat(v.price).toLocaleString()}</td>
                                    <td>$${(v.price * 0.16).toLocaleString()}</td>
                                    <td style="font-weight: 600; color: var(--success);">$${(v.price * 1.16).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px;">
                    <p style="margin: 0; font-size: 0.85rem; color: var(--text-gray);">
                        <i class="fas fa-info-circle"></i> Valuation based on current market conditions and vehicle specifications.
                    </p>
                </div>
                <button class="btn-print finance no-print" style="margin-top:30px; width:100%;" onclick="window.print()">
                    <i class="fas fa-download"></i> Download Financial PDF
                </button>
            `;
        }

        async function generateSoldVehiclesReport(content, title) {
            title.innerText = "Sold Vehicles Report - Sales History & Customer Records";
            
            const currentUser = getCurrentUser();
            
            if (!currentUser || currentUser.role !== 'admin') {
                content.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <i class="fas fa-lock" style="font-size: 3rem; opacity: 0.5; margin-bottom: 15px; display: block;"></i>
                        <h3 style="color: var(--danger);">Access Denied</h3>
                        <p>This report requires administrator privileges.</p>
                        <a href="login.html" class="btn-print" style="display: inline-block; text-decoration: none; margin-top: 20px;">Login as Admin</a>
                    </div>
                `;
                return;
            }
            
            try {
                // Fetch all purchases with admin access
                const purchasesResponse = await fetch(`${API_BASE}/admin/purchases?user_id=${currentUser.id}`);
                
                if (!purchasesResponse.ok) {
                    throw new Error('Failed to fetch purchase data');
                }
                
                const purchases = await purchasesResponse.json();
                
                // Filter for completed and verified purchases
                const soldVehicles = purchases.filter(p => 
                    p.payment_status === 'completed' || 
                    p.payment_status === 'PENDING_ADMIN_APPROVAL' ||
                    p.admin_verified === true
                );
                
                // Fetch vehicle details for each sold vehicle
                const vehiclesResponse = await fetch(`${API_BASE}/vehicles`);
                const allVehicles = await vehiclesResponse.json();
                
                // Create a map of vehicle details
                const vehicleMap = {};
                allVehicles.forEach(v => {
                    vehicleMap[v.id] = v;
                });
                
                // Calculate statistics
                const totalRevenue = soldVehicles.reduce((sum, p) => sum + parseFloat(p.amount), 0);
                const verifiedCount = soldVehicles.filter(p => p.admin_verified === true).length;
                const pendingCount = soldVehicles.filter(p => p.payment_status === 'PENDING_ADMIN_APPROVAL').length;
                
                if (soldVehicles.length === 0) {
                    content.innerHTML = `
                        <div style="text-align: center; padding: 60px 20px;">
                            <i class="fas fa-chart-line" style="font-size: 3rem; opacity: 0.5; margin-bottom: 15px; display: block;"></i>
                            <h3>No Sold Vehicles Yet</h3>
                            <p>There are no completed sales in the system at this time.</p>
                        </div>
                    `;
                    return;
                }
                
                content.innerHTML = `
                    <div class="summary-stats">
                        <div class="stat-card">
                            <div class="stat-label">Total Sold Units</div>
                            <h3>${soldVehicles.length}</h3>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total Revenue</div>
                            <h3 style="color: var(--success);">$${totalRevenue.toLocaleString()}</h3>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Verified Sales</div>
                            <h3 style="color: var(--success);">${verifiedCount}</h3>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Pending Verification</div>
                            <h3 style="color: var(--warning);">${pendingCount}</h3>
                        </div>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Vehicle</th>
                                    <th>Year</th>
                                    <th>Customer ID</th>
                                    <th>Customer Name</th>
                                    <th>Amount</th>
                                    <th>Payment Method</th>
                                    <th>Status</th>
                                    <th>Sale Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${soldVehicles.map(p => {
                                    const vehicle = vehicleMap[p.vehicle_id];
                                    const verificationStatus = p.admin_verified ? 'Verified' : (p.payment_status === 'PENDING_ADMIN_APPROVAL' ? 'Pending Cash' : 'Completed');
                                    const statusClass = p.admin_verified ? 'status-pill' : (p.payment_status === 'PENDING_ADMIN_APPROVAL' ? 'status-pill pending' : 'status-pill');
                                    
                                    return `
                                        <tr>
                                            <td><strong>#${p.id}</strong></td>
                                            <td style="font-weight: 500;">${vehicle ? `${vehicle.make} ${vehicle.model}` : `Vehicle #${p.vehicle_id}`}</td>
                                            <td>${vehicle ? vehicle.year : 'N/A'}</td>
                                            <td>${p.user_id}</td>
                                            <td class="customer-info">${p.user ? p.user.username : `User #${p.user_id}`}</td>
                                            <td style="color: var(--success); font-weight: 600;">$${parseFloat(p.amount).toLocaleString()}</td>
                                            <td><span class="status-pill">${p.payment_method === 'manual' ? 'Cash' : 'Card'}</span></td>
                                            <td><span class="${statusClass}">${verificationStatus}</span></td>
                                            <td>${new Date(p.created_at).toLocaleDateString()}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                    <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px;">
                        <p style="margin: 0; font-size: 0.85rem; color: var(--text-gray);">
                            <i class="fas fa-flag-checkered"></i> Report includes all completed and verified sales. 
                            Pending cash verifications require admin approval before vehicles are marked as sold.
                        </p>
                    </div>
                    <button class="btn-print sold no-print" style="margin-top:30px; width:100%;" onclick="window.print()">
                        <i class="fas fa-download"></i> Download Sold Vehicles Report
                    </button>
                `;
                
            } catch (error) {
                console.error('Error generating sold vehicles report:', error);
                content.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; opacity: 0.5; margin-bottom: 15px; display: block;"></i>
                        <h3 style="color: var(--danger);">Error Loading Report</h3>
                        <p>${error.message}</p>
                        <button class="btn-print" style="margin-top: 20px;" onclick="generateReport('sold')">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
            }
        }
        
        // Check admin access on page load
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = getCurrentUser();
            if (!currentUser || currentUser.role !== 'admin') {
                // Show a warning but still allow viewing limited reports
                const reportContent = document.getElementById('reportContent');
                if (reportContent) {
                    const warning = document.createElement('div');
                    warning.style.cssText = 'background: rgba(239,68,68,0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center;';
                    warning.innerHTML = `<i class="fas fa-shield-alt"></i> Some reports require administrator access. <a href="login.html" style="color: var(--accent-blue);">Login as Admin</a> to view sold vehicles report.`;
                    reportContent.parentElement.insertBefore(warning, reportContent);
                }
            }
        });
    </script>
</body>
</html>
